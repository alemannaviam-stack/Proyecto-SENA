{% load static %} 

<link rel="stylesheet" href="{% static 'estilo.css' %}"> 

<div style="max-width: 600px; margin: 40px auto; font-family: sans-serif; padding: 25px; border: 1px solid #e0e0e0; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2>➕ Registrar Nuevo Producto</h2>
    <p style="color: #666; font-size: 14px;">Completa los detalles técnicos del producto que vas a ofrecer al inventario.</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            {{ form.as_p }}
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" style="flex: 1; padding: 12px; background-color: #d15b8f; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold;">
                Guardar en Inventario
            </button>
            <a href="{% url 'dashboard_proveedor' %}" style="padding: 12px; background-color: #f5f5f5; color: #333; text-decoration: none; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center;">
                Cancelar
            </a>
        </div>
    </form>
</div>
